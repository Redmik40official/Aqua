<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Fish Pottery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Garamond:wght@400;600;700&family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header>
        <h1>Fish Pottery</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    
    <main style="max-width: 600px; margin: var(--spacing-2xl) auto; padding: var(--spacing-lg);">
        <section style="background: white; padding: var(--spacing-2xl); border-radius: 12px; box-shadow: 0 4px 20px rgba(26, 77, 109, 0.08);">
            <h2 style="text-align: center; margin-bottom: var(--spacing-lg);">Create New Account</h2>
            
            <form id="register-form" style="display: flex; flex-direction: column; gap: var(--spacing-lg);">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px; font-size: 1rem;">
                    </div>
                    
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px; font-size: 1rem;">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px; font-size: 1rem;">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px; font-size: 1rem;">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px; font-size: 1rem;">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px; font-size: 1rem;">
                </div>
                
                <div style="display: flex; align-items: center; gap: var(--spacing-sm);">
                    <input type="checkbox" id="terms" required style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="terms" style="margin: 0; cursor: pointer;">I agree to the Terms of Service and Privacy Policy</label>
                </div>
                
                <button type="submit" class="contact-form button" style="background: linear-gradient(135deg, var(--accent-warm), var(--accent-coral)); color: white; padding: var(--spacing-md); border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Create Account</button>
            </form>
            
            <div style="text-align: center; margin-top: var(--spacing-lg); color: var(--neutral-medium);">
                Already have an account? <a href="login.html" style="color: var(--primary-medium); font-weight: 600;">Login here</a>
            </div>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2024 Fish Pottery. All rights reserved.</p>
    </footer>
    
    <script src="../scripts/api.js"></script>
    <script src="../scripts/auth.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            
            if (password !== confirmPassword) {
                authManager.showNotification('Passwords do not match', 'error');
                return;
            }
            
            try {
                await authManager.register(username, email, password, firstName, lastName);
                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1000);
            } catch (error) {
                console.error('Registration failed:', error);
            }
        });
    </script>
</body>
</html>
