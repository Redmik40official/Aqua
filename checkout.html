<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Fish Pottery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Garamond:wght@400;600;700&family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/main.css">
</head>
<body>
    <header>
        <h1>Fish Pottery</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </nav>
    </header>
    
    <main style="padding: var(--spacing-2xl) var(--spacing-lg); max-width: 1000px; margin: 0 auto;">
        <h2>Checkout</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-lg); margin-top: var(--spacing-xl);">
            <div style="background: white; padding: var(--spacing-lg); border-radius: 12px; box-shadow: 0 4px 15px rgba(26, 77, 109, 0.1);">
                <h3>Shipping Address</h3>
                <form id="shipping-form" style="display: flex; flex-direction: column; gap: var(--spacing-md);">
                    <div>
                        <label>Full Name *</label>
                        <input type="text" id="fullName" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                    </div>
                    <div>
                        <label>Email *</label>
                        <input type="email" id="email" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                    </div>
                    <div>
                        <label>Phone *</label>
                        <input type="tel" id="phone" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                    </div>
                    <div>
                        <label>Street Address *</label>
                        <input type="text" id="address" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
                        <div>
                            <label>City *</label>
                            <input type="text" id="city" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                        </div>
                        <div>
                            <label>State/Province *</label>
                            <input type="text" id="state" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-md);">
                        <div>
                            <label>ZIP Code *</label>
                            <input type="text" id="zipCode" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                        </div>
                        <div>
                            <label>Country *</label>
                            <input type="text" id="country" value="United States" required style="width: 100%; padding: var(--spacing-md); border: 1px solid var(--neutral-border); border-radius: 8px;">
                        </div>
                    </div>
                </form>
                
                <h3 style="margin-top: var(--spacing-lg);">Payment Method</h3>
                <form style="display: flex; flex-direction: column; gap: var(--spacing-md);">
                    <label style="display: flex; align-items: center; gap: var(--spacing-sm);">
                        <input type="radio" name="payment" value="credit-card" checked>
                        <span>Credit Card</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: var(--spacing-sm);">
                        <input type="radio" name="payment" value="paypal">
                        <span>PayPal</span>
                    </label>
                    <label style="display: flex; align-items: center; gap: var(--spacing-sm);">
                        <input type="radio" name="payment" value="bank-transfer">
                        <span>Bank Transfer</span>
                    </label>
                </form>
            </div>
            
            <div style="background: white; padding: var(--spacing-lg); border-radius: 12px; box-shadow: 0 4px 15px rgba(26, 77, 109, 0.1); height: fit-content; position: sticky; top: 100px;">
                <h3>Order Summary</h3>
                <div id="order-items" style="margin-bottom: var(--spacing-lg); max-height: 300px; overflow-y: auto;">
                    <p>Loading order items...</p>
                </div>
                
                <div style="border-top: 2px solid var(--neutral-border); padding-top: var(--spacing-lg);">
                    <div class="cart-summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal-checkout">$0.00</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Shipping:</span>
                        <span id="shipping-checkout">$0.00</span>
                    </div>
                    <div class="cart-summary-row">
                        <span>Tax:</span>
                        <span id="tax-checkout">$0.00</span>
                    </div>
                    <div class="cart-summary-row" style="border-top: 1px solid var(--neutral-border); border-bottom: none; padding-bottom: 0;">
                        <span style="font-weight: 700; font-size: 1.2em;">Total:</span>
                        <span id="total-checkout" style="font-weight: 700; font-size: 1.2em;">$0.00</span>
                    </div>
                </div>
                
                <button onclick="placeOrder()" class="btn-checkout">Place Order</button>
                <a href="cart.html" style="display: block; text-align: center; padding: var(--spacing-md); color: var(--primary-medium); font-weight: 600; margin-top: var(--spacing-md);">Back to Cart</a>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2024 Fish Pottery. All rights reserved.</p>
    </footer>
    
    <script src="../scripts/api.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/cart.js"></script>
    <script>
        async function loadCheckout() {
            if (!authManager.isAuthenticated) {
                window.location.href = 'login.html';
                return;
            }
            
            await cartManager.loadCart();
            renderOrderSummary();
            prefillUserData();
        }
        
        async function prefillUserData() {
            try {
                const user = await usersAPI.getProfile();
                if (user.first_name || user.last_name) {
                    document.getElementById('fullName').value = `${user.first_name} ${user.last_name}`.trim();
                }
                if (user.email) {
                    document.getElementById('email').value = user.email;
                }
                if (user.phone) {
                    document.getElementById('phone').value = user.phone;
                }
                if (user.address) {
                    document.getElementById('address').value = user.address;
                }
                if (user.city) {
                    document.getElementById('city').value = user.city;
                }
                if (user.state) {
                    document.getElementById('state').value = user.state;
                }
                if (user.zip_code) {
                    document.getElementById('zipCode').value = user.zip_code;
                }
            } catch (error) {
                console.log('Could not prefill user data');
            }
        }
        
        function renderOrderSummary() {
            const itemsContainer = document.getElementById('order-items');
            const subtotal = cartManager.total;
            const shipping = subtotal > 50 ? 0 : 10;
            const tax = (subtotal + shipping) * 0.08;
            const total = subtotal + shipping + tax;
            
            itemsContainer.innerHTML = cartManager.items.map(item => `
                <div style="display: flex; justify-content: space-between; margin-bottom: var(--spacing-md); padding-bottom: var(--spacing-md); border-bottom: 1px solid var(--neutral-border);">
                    <div>
                        <p style="margin: 0; font-weight: 600;">${item.name}</p>
                        <p style="margin: 0; color: var(--neutral-medium); font-size: 0.9em;">Qty: ${item.quantity}</p>
                    </div>
                    <p style="margin: 0; font-weight: 600;">$${(item.price * item.quantity).toFixed(2)}</p>
                </div>
            `).join('');
            
            document.getElementById('subtotal-checkout').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('shipping-checkout').textContent = shipping === 0 ? 'Free' : `$${shipping.toFixed(2)}`;
            document.getElementById('tax-checkout').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total-checkout').textContent = `$${total.toFixed(2)}`;
        }
        
        async function placeOrder() {
            const shippingAddress = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                state: document.getElementById('state').value,
                zipCode: document.getElementById('zipCode').value,
                country: document.getElementById('country').value
            };
            
            const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
            
            // Validate shipping address
            if (!shippingAddress.fullName || !shippingAddress.address || !shippingAddress.city) {
                authManager.showNotification('Please fill in all required fields', 'warning');
                return;
            }
            
            try {
                const response = await cartManager.checkout(shippingAddress, paymentMethod);
                authManager.showNotification('Order placed successfully!', 'success');
                setTimeout(() => {
                    window.location.href = `order-confirmation.html?orderId=${response.orderId}`;
                }, 1000);
            } catch (error) {
                console.error('Order placement failed:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadCheckout);
    </script>
</body>
</html>
